<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <title>Página não encontrada - CISALV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <style>
    :root {
      --primary-color: #1C4587;
      --secondary-color: #2E5A9E;
      --text-color: #333;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .error-container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .error-logo {
      max-width: 250px;
      margin-bottom: 2rem;
    }

    .error-code {
      font-size: 8rem;
      font-weight: bold;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .error-title {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .error-message {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .error-btn {
      display: inline-block;
      background: var(--primary-color);
      color: #fff;
      padding: 1rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
      transition: all 0.3s ease;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }

    .error-btn:hover {
      background: #fff;
      color: var(--primary-color);
      transform: translateY(-2px);
    }

    .error-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <img src="/assets/logo_cisalv_path_branco.svg" alt="CISALV" class="error-logo">
    <div class="error-code">404</div>
    <h1 class="error-title">Página não encontrada</h1>
    <p class="error-message">
      A página que você procura não existe ou foi movida.<br>
      Verifique o endereço e tente novamente.
    </p>
    <a href="/" class="error-btn">Voltar para a página inicial</a>
  </div>
</body>
</html>
